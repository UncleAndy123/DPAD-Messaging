name: Android CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  quality-build-release-gates:
    runs-on: ubuntu-latest
    env:
      RELEASE_STORE_FILE: ${{ secrets.RELEASE_STORE_FILE }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug
        run: ./gradlew assembleDebug

      - name: Lint (baseline enforced)
        run: ./gradlew lintDebug

      - name: Unit smoke tests (SMS/MMS/scheduled)
        run: ./gradlew testDebugUnitTest

      - name: Verify Room migrations (schema + migration test compile)
        run: ./gradlew :app:assembleDebugAndroidTest

      - name: Build release (signed gate)
        run: ./gradlew assembleRelease
